<script>
      // --- LÓGICA DE NAVEGAÇÃO E CADASTRO ---

// --- 1. CONFIGURAÇÕES E VARIÁVEIS GLOBAIS ---
const urlSheets = "https://script.google.com/macros/s/AKfycbyOkNObww3Q-pnQOWUZM9nJIsXJjwqZRpfbDD8ak3LJ9ORoEia_P5wjjq6dc3ufnVbx/exec"; // Substituir pela sua URL real
let codigosLidos = [];
let dadosCompletos = [];
let enviandoDados = false;
let processandoCadastro = false;
let validandoAgora = false;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// --- FUNÇÃO PARA BYPASS DE CORS (COLE NO TOPO DO SCRIPT) ---
function fetchJSONP(url) {
    return new Promise((resolve, reject) => {
        const callbackName = 'jsonp_cb_' + Math.round(100000 * Math.random());
        const script = document.createElement('script');
        window[callbackName] = (data) => {
            resolve(data);
            document.body.removeChild(script);
            delete window[callbackName];
        };
        script.onerror = () => {
            reject(new Error("Erro de conexão"));
            document.body.removeChild(script);
            delete window[callbackName];
        };
        script.src = `${url}${url.includes('?') ? '&' : '?'}callback=${callbackName}`;
        document.body.appendChild(script);
    });
}


// --- 2. NAVEGAÇÃO E INTERFACE ---
function showScreen(id) {
    document.querySelectorAll('.card').forEach(s => s.classList.add('hidden'));
    const el = document.getElementById(id);
    if (el) el.classList.remove('hidden');
}


let html5QrCode; // Variável global mantida

// --- FUNÇÃO INICIAR (15 FPS + Reset da Barra) ---
async function iniciarConferencia() {
    const btnIniciar = document.getElementById("btnIniciar");
    const readerDiv = document.getElementById("reader");
    const statusInfo = document.getElementById("status-info");

    if (!document.getElementById("romaneio").value) {
        alert("⚠️ Selecione um Romaneio primeiro.");
        return;
    }

    if (audioCtx.state === 'suspended') await audioCtx.resume();

    btnIniciar.style.display = "none"; 
    readerDiv.style.display = "block";
    
    // Mostra a barra zerada assim que inicia
    atualizarBarraProgresso();

    if (html5QrCode) {
        try { await html5QrCode.stop(); } catch (e) {}
    }

    html5QrCode = new Html5Qrcode("reader");

    // Configuração de alta velocidade (15fps)
    const config = { 
        fps: 15, 
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0 
    };

    try {
        await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
        statusInfo.innerText = "Aguardando leitura...";
    } catch (err) {
        btnIniciar.style.display = "block";
        alert("Erro na câmera. Verifique as permissões.");
    }
}

// --- 3. CARREGAMENTO INICIAL (WINDOW.ONLOAD) ---
window.onload = function() {
    // Carregar Romaneios
    fetch(urlSheets + "?action=getRomaneios")
        .then(res => res.json())
        .then(data => {
            dadosCompletos = data;
            const select = document.getElementById("romaneio");
            if (select) {
                select.innerHTML = '<option value="">Selecione o Romaneio</option>';
                data.forEach(item => {
                    if (!item.Conferencia || item.Conferencia.toString().trim() === "") {
                        let opt = document.createElement("option");
                        opt.value = item.Romaneio;
                        opt.innerHTML = item.Romaneio;
                        select.appendChild(opt);
                    }
                });
            }
        });

    // Carregar Transportadoras
    fetch(urlSheets + "?action=getTransportadoras")
        .then(res => res.json())
        .then(lista => {
            const ids = ['login-transp', 'reg-transp-list'];
            const optionsHtml = '<option value="">Selecione a Transportadora</option>' + 
                               lista.map(t => `<option value="${t}">${t}</option>`).join('');
            ids.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = optionsHtml;
            });
        });
};

// --- 4. ROTINA DE LOGIN E CADASTRO ---
// --- FUNÇÃO DE LOGIN COM SPINNER, VALIDAÇÃO DE TRANSPORTADORA E CASE-INSENSITIVE TOTAL ---
async function realizarLogin() {
    // 1. Trava global para evitar duplo clique
    if (typeof enviandoDados !== 'undefined' && enviandoDados) return;

    // 2. Captura elementos usando o ID da tela (Isolamento total)
    const container = document.getElementById("screen-login");
    const btnLogin = container.querySelector(".btn-primary");
    
    // 3. Normalização: Tudo para minúsculo e sem espaços (Incluso Senha)
    const inputEmail  = document.getElementById('login-user').value.trim().toLowerCase();
    const inputPass   = document.getElementById('login-pass').value.trim().toLowerCase(); // Senha agora ignora caixa
    const inputTransp = document.getElementById('login-transp').value.trim().toLowerCase();

    if (!inputEmail || !inputPass || !inputTransp) {
        if (typeof tocarBeep === 'function') tocarBeep('erro');
        return alert("⚠️ Preencha todos os campos corretamente.");
    }

    // 4. Ativa travas e Spinner
    if (typeof enviandoDados !== 'undefined') enviandoDados = true;
    btnLogin.disabled = true;
    const textoOriginal = btnLogin.innerHTML;
    btnLogin.innerHTML = '<div class="spinner"></div> Autenticando...';

    // 5. URL com parâmetros padronizados (Todos em minúsculas)
    const url = `${urlSheets}?action=validarLogin&email=${encodeURIComponent(inputEmail)}&senha=${encodeURIComponent(inputPass)}&transp=${encodeURIComponent(inputTransp)}`;

    try {
        const res = await fetch(url);
        const data = await res.json();

        if (data.authorized) {
            if (typeof tocarBeep === 'function') tocarBeep('sucesso');
            alert("✅ Bem-vindo(a), " + data.nome);
            
            // Injeta dados na tela principal
            document.getElementById('usuario').value = data.nome;
            // Mantemos o valor original do Select para exibição/relatório se necessário
            document.getElementById('transp').value = document.getElementById('login-transp').value;
            
            showScreen('screen-main');
        } else {
            if (typeof tocarBeep === 'function') tocarBeep('erro');
            alert(data.error || "❌ Dados incorretos.");
            btnLogin.disabled = false;
            btnLogin.innerHTML = textoOriginal;
        }
    } catch (err) {
        console.error("Erro no login:", err);
        alert("🌐 Erro de conexão. Verifique o sinal ou o Deploy.");
        btnLogin.disabled = false;
        btnLogin.innerHTML = textoOriginal;
    } finally {
        if (typeof enviandoDados !== 'undefined') enviandoDados = false;
    }
}




// --- NOVA FUNÇÃO: SOLICITAR RECUPERAÇÃO ---
async function solicitarRecuperacao() {
    const email = document.getElementById('recup-email').value.trim().toLowerCase();
    const btn = document.getElementById('btn-recuperar');

    if (!email) return alert("Informe seu e-mail de cadastro!");

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Verificando...';

    const url = `${urlSheets}?action=recuperarSenha&email=${encodeURIComponent(email)}`;

    try {
        // Para recuperação, como é apenas um aviso, usamos no-cors para evitar erros
        await fetch(url, { method: 'GET', mode: 'no-cors' });
        
        alert("✅ Se o e-mail existir no sistema, você receberá as instruções em instantes.");
        showScreen('screen-login');
    } catch (e) {
        alert("Erro ao processar solicitação.");
    } finally {
        btn.disabled = false;
        btn.innerHTML = "Recuperar Senha";
    }
}

// --- FUNÇÃO DE CADASTRO COM SPINNER E TRAVA ---
async function cadastrar() {
    if (typeof processandoCadastro !== 'undefined' && processandoCadastro) return;

    const btn = document.getElementById('btn-cadastrar');
    const nome = document.getElementById('reg-nome').value.trim();
    const doc = document.getElementById('reg-doc').value.trim();
    const email = document.getElementById('reg-email').value.trim().toLowerCase();
    const transp = document.getElementById('reg-transp-list').value;
    const senha = document.getElementById('reg-pass').value.trim();
    const senha2 = document.getElementById('reg-pass2').value.trim();

    if (!nome || !doc || !email || !transp || !senha) return alert("⚠️ Preencha todos os campos!");
    if (senha !== senha2) return alert("❌ As senhas não conferem!");

    // Ativa trava e visual
    processandoCadastro = true;
    btn.disabled = true;
    const originalText = btn.innerHTML;
    btn.innerHTML = '<div class="spinner"></div> Gravando Registro...';

    const url = `${urlSheets}?action=salvarNovoUsuario&nome=${encodeURIComponent(nome)}&documento=${encodeURIComponent(doc)}&email=${encodeURIComponent(email)}&transp=${encodeURIComponent(transp)}&senha=${encodeURIComponent(senha)}`;

    // --- ATUALIZE O TRY/CATCH DA SUA FUNÇÃO CADASTRAR ---
    try {
        // IMPORTANTE: Trocamos o 'fetch' por 'fetchJSONP'
        const resJson = await fetchJSONP(url); 
    
        if (resJson.success) {
            alert("✅ Cadastro realizado com sucesso!");
            location.reload();
        } else {
            alert("❌ Erro: " + resJson.error);
            processandoCadastro = false;
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    } catch (err) {
        console.error(err);
        alert("🌐 Erro na comunicação com o servidor.");
        processandoCadastro = false;
        btn.disabled = false;
        btn.innerHTML = originalText;
    }


}


// Função auxiliar para resetar o botão em caso de falha
function resetBotaoCadastro(btn, textoOriginal) {
    processandoCadastro = false;
    btn.disabled = false;
    btn.innerHTML = textoOriginal;
    if(typeof tocarBeep === 'function') tocarBeep('erro');
}



// --- 5. LOGICA DE CONFERÊNCIA (DADOS EXTRAS, PLACA E SINCRONISMO) ---
async function atualizarDadosExtras() {
    const selectedId = document.getElementById("romaneio").value;
    const btnIniciar = document.getElementById("btnIniciar");
    const statusInfo = document.getElementById("status-info");
    const info = dadosCompletos.find(r => r.Romaneio === selectedId);

    if (info) {
        document.getElementById("campo_operador").value = info.Operador || "";
        document.getElementById("transp").value = info.Transp || "";
        document.getElementById("total_pedidos").value = info.TTPedidos || 0;
        document.getElementById("total_volumes").value = info.TTvols || 0;

        const placaCorreta = info.Placa ? info.Placa.toString().toUpperCase().replace(/[^A-Z0-9]/g, '') : "";
        const promptResposta = prompt("🔐 VALIDAÇÃO\nInforme a PLACA do veículo:");
        const placaDigitada = promptResposta ? promptResposta.toUpperCase().replace(/[^A-Z0-9]/g, '') : "";

        if (placaDigitada === placaCorreta && placaDigitada !== "") {
            
            // Início do feedback de carregamento
            if (statusInfo) {
                statusInfo.innerText = "⏳ Sincronizando dados...";
                statusInfo.style.background = "#fff3cd";
                statusInfo.style.display = "block";
            }
            btnIniciar.disabled = true;
            btnIniciar.innerText = "Sincronizando...";

            try {
                const response = await fetch(`${urlSheets}?action=verificarPendencias&romaneio=${encodeURIComponent(selectedId)}`);
                const result = await response.json();

                if (result.faltantes) {
                    const totalPedidos = parseInt(info.TTPedidos) || 0;
                    const qtdFaltantes = result.faltantes.length;
                    const jaLidosNoSheets = totalPedidos - qtdFaltantes;

                    // Atualiza o progresso visual
                    codigosLidos = []; 
                    document.getElementById("contador").innerText = jaLidosNoSheets;
                    if (typeof atualizarBarraProgresso === "function") {
                        atualizarBarraProgresso(jaLidosNoSheets); 
                    }

                    // --- NOVA TRAVA: BLOQUEIO SE PENDÊNCIAS = 0 ---
                    if (qtdFaltantes === 0) {
                        alert("✅ Este romaneio já está 100% CONCLUÍDO!\nO acesso à câmera foi bloqueado.");
                        if (statusInfo) {
                            statusInfo.innerText = "✅ ROMANEIO CONCLUÍDO";
                            statusInfo.style.background = "#d4edda";
                        }
                        btnIniciar.innerText = "CONCLUÍDO";
                        btnIniciar.disabled = true;
                        btnIniciar.style.opacity = "0.5";
                        btnIniciar.style.backgroundColor = "#2b9348"; // Fica verde indicando conclusão
                        return; // Sai da função aqui, impedindo a liberação do botão
                    }
                }
                
                // Se chegou aqui, ainda há pendências. Libera o botão.
                if (statusInfo) {
                    statusInfo.innerText = "✅ Sincronização concluída!";
                    statusInfo.style.background = "#d4edda";
                }
                btnIniciar.disabled = false; 
                btnIniciar.style.opacity = "1";
                btnIniciar.innerText = "Iniciar Conferência";

            } catch (e) {
                console.error("Erro ao sincronizar:", e);
                btnIniciar.disabled = false;
                btnIniciar.innerText = "Iniciar Conferência";
            }
            
        } else {
            alert("❌ Placa incorreta!");
            document.getElementById("romaneio").value = "";
            limparCamposExtras();
        }
    }
}




function limparCamposExtras() {
    ["campo_operador", "transp", "total_pedidos", "total_volumes"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = (id === "total_pedidos" || id === "total_volumes") ? 0 : "";
    });
}

// --- 6. ESCANEAMENTO, BEEP E PROGRESSO ---
function tocarBeep(tipo) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(tipo === 'sucesso' ? 880 : 220, audioCtx.currentTime);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    osc.stop(audioCtx.currentTime + 0.5);
}

// --- FUNÇÃO DE SCAN (Alta Performance + Sheets Realtime + Beep + Barra) ---
async function onScanSuccess(decodedText) {
    if (validandoAgora) return;

    const barcodeLimpo = decodedText.trim();
    const romaneioVal = document.getElementById("romaneio").value;
    const usuario = document.getElementById("usuario").value;
    const status = document.getElementById("status-info");

    // Validações locais rápidas
    if (codigosLidos.includes(barcodeLimpo)) {
        tocarBeep('erro');
        status.innerText = "⚠️ JÁ LIDO: " + barcodeLimpo;
        status.style.background = "#fff3cd";
        return;
    }

    validandoAgora = true;
    status.innerText = "🔍 Validando: " + barcodeLimpo + "...";

    try {
    // Dentro da função onScanSuccess, onde você define os params:
    const params = new URLSearchParams({
        action: "validarBarcode",
        barcode: barcodeLimpo,
        romaneio: romaneioVal,
        conferente: usuario,
        confirmado: "OK",
        // Adicionamos o campo exato que o Backend precisa processar
        data_conferencia: new Date().toLocaleString("pt-BR") 
    });

        // Chamada em tempo real para o Sheets
        const response = await fetch(`${urlSheets}?${params.toString()}`);
        const result = await response.json();

        if (result.valid) {
            tocarBeep('sucesso'); // Seu beep sintético
            codigosLidos.push(barcodeLimpo);

            // Atualiza Contador e Barra de Progresso
            document.getElementById("contador").innerText = codigosLidos.length;
            atualizarBarraProgresso(); 

            // Adiciona na lista visual
            const lista = document.getElementById("itens-lidos");
            lista.innerHTML = `<div class="item-codigo"><span>${barcodeLimpo}</span> <span style="color:var(--success)">✓</span></div>` + lista.innerHTML;

            status.innerText = "✅ VALIDADO E ATUALIZADO";
            status.style.background = "#d4edda";
        } else {
            tocarBeep('erro');
            status.innerText = "❌ " + (result.error || "INVÁLIDO");
            status.style.background = "#f8d7da";
        }
    } catch (error) {
        tocarBeep('erro');
        status.innerText = "🌐 Erro de conexão";
    } finally {
        setTimeout(() => { validandoAgora = false; }, 1000); // Delay curto para leitura rápida
    }
}

    // --- LÓGICA DA BARRA (Meta: total_pedidos) ---
    function atualizarBarraProgresso(valorManual = null) {
        const totalPedidos = parseInt(document.getElementById('total_pedidos').value) || 0;
        // Se passarmos um valor (do Sheets), usa ele. Se não, usa o tamanho do array local.
        const lidos = (valorManual !== null) ? valorManual : codigosLidos.length;
        
        const barra = document.getElementById('barraProgresso');
        const texto = document.getElementById('txt-progresso');
    
        if (totalPedidos > 0 && barra) {
            const percentual = Math.min((lidos / totalPedidos) * 100, 100);
            barra.style.width = percentual + "%";
            
            if (texto) {
                texto.innerText = `${lidos} / ${totalPedidos} Pedidos (${Math.round(percentual)}%)`;
            }
    
            // Feedback de cor
            barra.style.backgroundColor = (percentual === 100) ? "#2b9348" : "var(--nu-purple)";
        }
    }


    // --- 7. PENDÊNCIAS, ASSINATURA E ENVIO FINAL ---
    async function verificarPendencias() {
        const romaneio = document.getElementById("romaneio").value;
        if (!romaneio) return alert("⚠️ Selecione um romaneio primeiro!");
    
        // Feedback visual no botão
        const btn = document.querySelector("button[onclick='verificarPendencias()']");
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerText = "⌛ Verificando...";
    
        try {
            const response = await fetch(`${urlSheets}?action=verificarPendencias&romaneio=${encodeURIComponent(romaneio)}`);
            const result = await response.json();
    
            if (result.faltantes && result.faltantes.length > 0) {
                const total = result.faltantes.length;
                const lista = result.faltantes.slice(0, 15).join("\n- ");
                alert(`📦 PEDIDOS FALTANTES (${total}):\n\n- ${lista}${total > 15 ? '\n... e outros.' : ''}`);
            } else {
                alert("✅ Tudo Conferido! Não há pendências para este romaneio.");
            }
        } catch (e) {
            console.error("Erro ao buscar pendências:", e);
            alert("❌ Erro ao conectar com o servidor.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }



// Funções de Assinatura (Canvas)
// --- Funções de Assinatura (Canvas + Touch Support) ---
const canvas = document.getElementById('canvasAssinatura');
const ctx = canvas.getContext('2d');
let desenhando = false;

// Ajustes de estilo do pincel
ctx.lineWidth = 2;
ctx.lineCap = 'round';
ctx.strokeStyle = '#000';

// Função auxiliar para pegar a posição correta
function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    // Verifica se é toque ou mouse
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
        x: clientX - rect.left,
        y: clientY - rect.top
    };
}

function iniciarDesenho(e) {
    desenhando = true;
    const pos = getMousePos(e);
    ctx.beginPath(); // Fundamental para não ligar traços antigos
    ctx.moveTo(pos.x, pos.y);
    if (e.type === 'touchstart') e.preventDefault(); // Evita rolar a página no celular
}

function moverDesenho(e) {
    if (!desenhando) return;
    const pos = getMousePos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    if (e.type === 'touchmove') e.preventDefault(); // Evita rolar a página no celular
}

function pararDesenho() {
    desenhando = false;
}

// Eventos para Mouse
canvas.addEventListener('mousedown', iniciarDesenho);
canvas.addEventListener('mousemove', moverDesenho);
window.addEventListener('mouseup', pararDesenho);

// Eventos para Touch (Celular) - ESSENCIAL PARA O SEU APP
canvas.addEventListener('touchstart', iniciarDesenho, { passive: false });
canvas.addEventListener('touchmove', moverDesenho, { passive: false });
canvas.addEventListener('touchend', pararDesenho);


function limparAssinatura() {
    // 1. Limpa visualmente o retângulo do canvas (Sua lógica original)
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 2. Reseta o "caminho" de desenho (Crucial para não ligar traços antigos aos novos)
    ctx.beginPath();
    
    // 3. Feedback visual opcional (Console)
    console.log("Assinatura limpa e resetada.");
}


function assinaturaVazia() {
    const canvas = document.getElementById('canvasAssinatura');
    if (!canvas) return true;

    // Cria um canvas temporário do mesmo tamanho para comparação
    const blank = document.createElement('canvas');
    blank.width = canvas.width;
    blank.height = canvas.height;

    // Compara o conteúdo em Base64
    // Se forem idênticos, o usuário não desenhou nada
    return canvas.toDataURL() === blank.toDataURL();
}



// Variável global para controle de envio (Mantenha no topo do script)
//let enviandoDados = false;

async function enviarDadosFinais() {
    // 1. TRAVA DE SEGURANÇA: Impede múltiplos envios
    if (enviandoDados) {
        return; // Retorno silencioso para não acumular alertas
    }

    const btn = document.querySelector(".btn-warning") || document.querySelector(".btn-success") || document.querySelector("button[onclick='finalizarLote()']");
    const romaneio = document.getElementById("romaneio").value;
    const usuario = document.getElementById("usuario").value;
    const areaAssinatura = document.getElementById("areaAssinatura");

    // 2. ATIVA A TRAVA E ATUALIZA INTERFACE COM SPINNER
    enviandoDados = true; 
    btn.disabled = true; 
    // Injeta o Spinner visual e mantém o texto
    btn.innerHTML = '<div class="spinner"></div> Enviando ao Servidor...';
    
    if (areaAssinatura) {
        areaAssinatura.style.opacity = "0.5"; 
    }

    try {
        const canvasParaEnvio = document.getElementById('canvasAssinatura');
        const assinaturaBase64 = canvasParaEnvio ? canvasParaEnvio.toDataURL("image/png") : "";

        const payload = {
            action: "finalizarLote",
            romaneio: romaneio,
            usuario: usuario,
            codigos: typeof codigosLidos !== 'undefined' ? codigosLidos : [],
            geo: window.lastGeo || "0,0",
            assinatura: assinaturaBase64,
            conferencia: new Date().toLocaleString("pt-BR"),
            intercorrencia: typeof intercorrenciaFinal !== 'undefined' ? intercorrenciaFinal : "CONCLUÍDO",
            obs_final: "Conferência finalizada via APP"
        };

        const response = await fetch(urlSheets, {
            method: 'POST',
            body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.success) {
            alert("✅ Lote finalizado! Aba ROMANEIOS atualizada com sucesso.");
            location.reload(); 
        } else {
            throw new Error(result.error || "Erro desconhecido no servidor.");
        }

    } catch (e) {
        console.error("Erro Crítico no Envio:", e);
        alert("❌ Falha ao enviar: " + e.message);
        
        // REVERSÃO: Libera a trava e remove o spinner se der erro
        enviandoDados = false;
        btn.disabled = false;
        btn.innerHTML = "✅ Confirmar Assinatura e Enviar";
        if (areaAssinatura) {
            areaAssinatura.style.opacity = "1";
        }
    }
}




let intercorrenciaFinal = "CONCLUÍDO"; // Variável global para armazenar o status

async function finalizarLote() {
    if (enviandoDados) return;

    const romaneioVal = document.getElementById("romaneio").value;
    const areaAssinatura = document.getElementById("areaAssinatura");
    const btn = document.querySelector("button[onclick='finalizarLote()']");

    if (!romaneioVal) return alert("⚠️ Selecione um romaneio!");

    // FASE DE ENVIO FINAL (Se a assinatura já estiver visível)
    if (areaAssinatura && (areaAssinatura.style.display === "block" || !areaAssinatura.classList.contains('hidden'))) {
        if (assinaturaVazia()) return alert("⚠️ Assine antes de finalizar!");
        await enviarDadosFinais();
        return;
    }

    btn.disabled = true;
    btn.innerText = "🔍 Validando...";

    try {
        // 1. VALIDAÇÃO DE PENDÊNCIAS
        const response = await fetch(`${urlSheets}?action=verificarPendencias&romaneio=${encodeURIComponent(romaneioVal)}`);
        const check = await response.json();

        // BIFURCAÇÃO: Se houver pendências (> 0)
        if (check.faltantes && check.faltantes.length > 0) {
            const desejaPausar = confirm(`⚠️ O romaneio tem ${check.faltantes.length} pedidos pendentes de confirmação!\n\nDeseja colocar em espera/stand by?`);
            
            if (desejaPausar) {
                // Abre a nova tela de intercorrência
                showScreen('screen-intercorrencia'); 
                btn.disabled = false;
                btn.innerText = "Finalizar Lote";
                return; // Para o fluxo aqui
            } else {
                alert("Conclusão cancelada. Termine a conferência de todos os itens.");
                btn.disabled = false;
                btn.innerText = "Finalizar Lote";
                return;
            }
        }

        // SE NÃO HOUVER PENDÊNCIAS, SEGUE O FLUXO NORMAL
        intercorrenciaFinal = "CONCLUÍDO";
        await prepararFaseAssinatura(btn, areaAssinatura);

    } catch (e) {
        btn.disabled = false;
        btn.innerText = "Finalizar Lote";
        alert("❌ Erro na validação. Verifique sua conexão.");
    }
}

// Nova função para quando o usuário registra o motivo na tela de Stand By
async function registrarIntercorrencia() {
    const motivo = document.getElementById("select-motivo").value;
    const obs = document.getElementById("obs-intercorrencia").value;
    const btnMain = document.querySelector("button[onclick='finalizarLote()']");
    const areaAss = document.getElementById("areaAssinatura");

    if (!motivo) return alert("Por favor, selecione o motivo do Stand By!");

    intercorrenciaFinal = `[STANDBY] ${motivo} | Obs: ${obs}`;
    
    // Volta para a tela principal para colher assinatura e GPS
    showScreen('screen-main'); 
    await prepararFaseAssinatura(btnMain, areaAss);
}

// Função auxiliar para evitar repetição de código (GPS + Liberar Assinatura)
async function prepararFaseAssinatura(btn, areaAssinatura) {
    btn.innerText = "📍 Localizando...";
    
    try {
        const pos = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, { 
                timeout: 5000, 
                enableHighAccuracy: false,
                maximumAge: 60000 
            });
        });
        window.lastGeo = `${pos.coords.latitude}, ${pos.coords.longitude}`;
    } catch (gpsError) {
        window.lastGeo = "0,0 (Timeout GPS)";
    }

    // Libera a interface de assinatura
    btn.disabled = false;
    btn.innerText = "✅ Confirmar e Enviar";
    btn.style.backgroundColor = "#ffba08"; 

    if (areaAssinatura) {
        areaAssinatura.classList.remove('hidden'); 
        areaAssinatura.style.display = "block";
        areaAssinatura.scrollIntoView({ behavior: 'smooth' });
    }
}
